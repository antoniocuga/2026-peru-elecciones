<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D3.js World Map</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <style>
    body { margin: 0; background: #000; }
    svg { display: block; }
    path { stroke: #333; stroke-width: 0.5px; }
    .ocean { fill: #0a4771; }
    .land { fill: #e3dac9; }
    .graticule { fill: none; stroke: #5a7288; stroke-opacity: 0.5; }
    .country {
      stroke: #223848;
      stroke-width: 0.5px;
    }
    .tooltip {
      position: fixed;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.9);
      color: #fff;
      padding: 8px 10px;
      border-radius: 6px;
      font: 12px/1.35 sans-serif;
      pointer-events: none;
      display: none;
      max-width: 260px;
    }
  </style>
</head>
<body>
  <svg width="960" height="600"></svg>
  <div id="tooltip" class="tooltip"></div>
  <script>
    const svg = d3.select("svg");
    const tooltip = d3.select("#tooltip");
    const width = +svg.attr("width");
    const height = +svg.attr("height");

    const projection = d3.geoNaturalEarth1()
      .scale(220)
      .translate([width / 2, height / 2]);

    const path = d3.geoPath().projection(projection);

    const graticule = d3.geoGraticule().step([10, 10]);

    svg.append("rect")
      .attr("class", "ocean")
      .attr("x", 0)
      .attr("y", 0)
      .attr("width", width)
      .attr("height", height);

    svg.append("path")
      .datum(graticule)
      .attr("class", "graticule")
      .attr("d", path);

    const countriesLayer = svg.append("g");

    function topLeader(country) {
      const details = Array.isArray(country?.details) ? country.details : [];
      return details.length ? details[0] : null;
    }

    function normalizeName(v) {
      return String(v || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
    }

    const COUNTRY_ALIASES = {
      "estados unidos de america": "united states",
      "gran bretana": "united kingdom",
      "holanda": "netherlands",
      "republica de corea": "south korea",
      "republica popular china": "china",
      "republica checa": "czechia",
      "rusia": "russian federation",
      "antillas holandesas": "curacao",
      "republica arabe de egipto": "egypt",
      "emiratos arabes unidos": "united arab emirates",
      "principado de andorra": "andorra",
      "gran ducado de luxemburgo": "luxembourg",
      "iran": "iran",
      "turquia": "turkiye",
      "mexico": "mexico"
    };

    async function loadWorldJson() {
      const candidates = [
        "/src/data/mapas/world.json",
        "./src/data/mapas/world.json",
        "https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json"
      ];
      for (const url of candidates) {
        try {
          const data = await d3.json(url);
          if (data?.objects?.countries) return data;
        } catch (_) {
          // try next source
        }
      }
      throw new Error("No se pudo cargar world.json (local ni CDN).");
    }

    // Load and draw land + extranjero country data
    Promise.all([
      loadWorldJson(),
      d3.json("./data-primera-vuelta/extranjero_paises.json")
    ]).then(([world, extranjero]) => {
      const countries = topojson.feature(world, world.objects.countries).features;

      const rows = Array.isArray(extranjero?.countries) ? extranjero.countries : [];
      const rowByCountryName = new Map();
      rows.forEach((r) => {
        const raw = normalizeName(r.country);
        const aliased = normalizeName(COUNTRY_ALIASES[raw] || raw);
        if (aliased) rowByCountryName.set(aliased, r);
      });

      countriesLayer.selectAll("path.country")
        .data(countries)
        .enter()
        .append("path")
        .attr("class", "country")
        .attr("d", path)
        .attr("fill", (d) => {
          const name = d?.properties?.name || "";
          const row = rowByCountryName.get(normalizeName(name));
          const leader = topLeader(row);
          return leader?.color || "#e3dac9";
        })
        .on("mousemove", (event, d) => {
          const name = d?.properties?.name || "País";
          const row = rowByCountryName.get(normalizeName(name));
          const leader = topLeader(row);
          const leaderName = leader?.partido || "Sin data";
          const leaderVotes = Number(leader?.votos || 0).toLocaleString("es-PE");
          const totalVotes = Number(row?.totalValidos || row?.totalVotes || 0).toLocaleString("es-PE");
          tooltip
            .style("display", "block")
            .style("left", `${event.clientX + 12}px`)
            .style("top", `${event.clientY + 12}px`)
            .html(
              `<strong>${name}</strong><br>` +
              `Votos válidos: ${totalVotes}<br>` +
              `Líder: ${leaderName}<br>` +
              `Votos líder: ${leaderVotes}`
            );
        })
        .on("mouseleave", () => {
          tooltip.style("display", "none");
        });

    }).catch((err) => {
      svg.append("text")
        .attr("x", width / 2)
        .attr("y", height / 2)
        .attr("text-anchor", "middle")
        .attr("fill", "#fff")
        .attr("font-size", 14)
        .text(`Error cargando mapa: ${err?.message || "desconocido"}`);
    });

    // Static map (no globe rotation)
  </script>
</body>
</html>
